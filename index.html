<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0e" />
  <title>pogadaj.se — gadaj, a nauczysz się angielskiego</title>
  <meta name="description" content="Osobisty nauczyciel AI do mówienia po angielsku. Rozmawiaj z Izabelą, popraw wymowę i przełam blokadę." />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/izabela/avatar.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <!-- Tło: kosmos / planety / rakietki (wg projektu logowania) -->
  <div class="cosmos" aria-hidden="true">
    <div class="stars"></div>
    <div class="planet planet--jupiter planet--a"></div>
    <div class="planet planet--jupiter planet--b"></div>
    <div class="sky-rocket sky-rocket--1">
      <svg viewBox="0 0 60 30" width="60" height="30"><g fill="none" stroke="#8a8a96" stroke-width="2">
        <ellipse cx="30" cy="18" rx="22" ry="7"/><path d="M16 14 A16 10 0 0 1 44 14"/><circle cx="30" cy="11" r="3"/>
      </g></svg>
    </div>
    <div class="sky-rocket sky-rocket--2">
      <svg viewBox="0 0 60 30" width="44" height="22"><g fill="none" stroke="#7a7a86" stroke-width="2">
        <ellipse cx="30" cy="18" rx="22" ry="7"/><path d="M16 14 A16 10 0 0 1 44 14"/><circle cx="30" cy="11" r="3"/>
      </g></svg>
    </div>
  </div>

  <!-- Tu router montuje aktywny ekran -->
  <main id="app" class="app-root" aria-live="polite">
    <div id="boot" style="text-align:center;margin-top:20vh;font-family:system-ui;color:#aab3d8">
      <div style="font-size:2rem">🚀</div>
      <p>Ładuję pogadaj.se…</p>
    </div>
  </main>

  <!-- Toasty / powiadomienia -->
  <div id="toasts" class="toasts" aria-live="assertive"></div>

  <!-- Widoczny raport błędów (gdyby JS nie wystartował) -->
  <script>
    window.__bootError = function (msg) {
      var app = document.getElementById('app');
      if (!app) return;
      app.innerHTML = '<div style="max-width:560px;margin:12vh auto;padding:24px;border-radius:16px;'
        + 'background:#1a2150;border:1px solid #ff6b81;color:#eef2ff;font-family:system-ui">'
        + '<h2 style="margin:0 0 8px">⚠️ Coś nie wystartowało</h2>'
        + '<p style="color:#aab3d8">Pokaż mi ten komunikat, a naprawię:</p>'
        + '<pre style="white-space:pre-wrap;background:#0a0e27;padding:12px;border-radius:10px;'
        + 'color:#ff7eb6;font-size:.85rem">' + String(msg) + '</pre></div>';
    };
    window.addEventListener('error', function (e) {
      var t = e.target;
      if (t && (t.tagName === 'SCRIPT' || t.tagName === 'LINK' || t.tagName === 'IMG')) {
        window.__bootError('Nie udało się wczytać pliku: ' + (t.src || t.href));
        return;
      }
      window.__bootError((e.error && e.error.stack) || e.message || e.filename + ':' + e.lineno);
    }, true);
    window.addEventListener('unhandledrejection', function (e) {
      window.__bootError('Promise: ' + (e.reason && (e.reason.stack || e.reason.message) || e.reason));
    });
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
